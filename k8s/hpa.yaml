apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: antifraud-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: antifraud-api
  minReplicas: 4
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

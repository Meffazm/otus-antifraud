# CI/CD pipeline for antifraud-api
#
# Required GitHub Secrets:
#   YC_SA_KEY          — Yandex Cloud service account authorized key (JSON)
#   YC_FOLDER_ID       — Yandex Cloud folder ID
#   YC_REGISTRY_ID     — Container Registry ID
#   YC_K8S_CLUSTER_ID  — Managed Kubernetes cluster ID

name: CI/CD

on:
  push:
    branches: [main, k8s-deploy]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -n -i /opt/yc
          echo "/opt/yc/bin" >> $GITHUB_PATH

      - name: Authenticate to Yandex Cloud
        run: |
          echo '${{ secrets.YC_SA_KEY }}' > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}

      - name: Login to Container Registry
        run: |
          yc container registry configure-docker

      - name: Build Docker image
        run: |
          docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/antifraud-api:${{ github.sha }} .
          docker tag cr.yandex/${{ secrets.YC_REGISTRY_ID }}/antifraud-api:${{ github.sha }} cr.yandex/${{ secrets.YC_REGISTRY_ID }}/antifraud-api:latest

      - name: Push Docker image
        run: |
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/antifraud-api:${{ github.sha }}
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/antifraud-api:latest

      - name: Get K8s credentials
        run: |
          yc managed-kubernetes cluster get-credentials ${{ secrets.YC_K8S_CLUSTER_ID }} --external --force

      - name: Deploy to K8s
        run: |
          sed -i "s|cr.yandex/REGISTRY_ID/antifraud-api:latest|cr.yandex/${{ secrets.YC_REGISTRY_ID }}/antifraud-api:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/antifraud-api --timeout=120s
